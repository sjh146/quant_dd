version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: quant_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-quant_user}
      POSTGRES_PASSWORD: ${DB_PASS:-quant_pass}
      POSTGRES_DB: ${DB_NAME:-quant_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for fast caching and in-memory features (orderbook snapshots, tensors) and Pub/Sub
  redis:
    image: redis:7
    container_name: quant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # AI Trading Ubuntu Agent Layer
  ai_agents:
    build: .
    container_name: quant_ai_agents
    depends_on:
      - postgres
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_URL=postgresql://quant_user:quant_pass@postgres:5432/quant_db
    volumes:
      - .:/app
    command: tail -f /dev/null  # Keep container alive for development

volumes:
  postgres_data:
  redis_data: